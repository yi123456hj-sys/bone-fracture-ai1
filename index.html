<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BoneScan AI — 骨折智能分析系统</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050b18;
  --bg2: #080f1f;
  --card: #0d1829;
  --card2: #111e30;
  --border: rgba(0,180,255,.15);
  --border2: rgba(0,180,255,.08);
  --blue: #00b4ff;
  --blue2: #0070cc;
  --teal: #00e5cc;
  --green: #00d97e;
  --yellow: #ffd60a;
  --red: #ff4d6d;
  --orange: #ff9500;
  --text: #e8f0fe;
  --text2: #94a3b8;
  --text3: #4a5568;
  --glow: 0 0 24px rgba(0,180,255,.25);
  --glow2: 0 0 48px rgba(0,180,255,.15);
  --radius: 16px;
  --radius2: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans SC','Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Grid Background ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,180,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0f1e}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}

/* ── Layout ── */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
header{
  background:rgba(5,11,24,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#0d2a4e,#0a3a6e);
  border:1px solid rgba(0,180,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 0 12px rgba(0,180,255,.2)
}
.logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--blue);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}

/* ── Language Switcher ── */
.lang-btn{
  display:flex;background:var(--card);border:1px solid var(--border);
  border-radius:8px;overflow:hidden
}
.lang-btn button{
  padding:6px 12px;background:none;border:none;color:var(--text2);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .2s
}
.lang-btn button.active{background:var(--blue2);color:#fff}
.lang-btn button:hover:not(.active){background:rgba(0,180,255,.1);color:var(--blue)}

/* ── API Key Bar ── */
.api-bar{
  background:linear-gradient(135deg,rgba(13,26,61,.8),rgba(8,15,31,.8));
  border-bottom:1px solid var(--border2);padding:12px 24px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap
}
.api-bar label{font-size:12px;color:var(--text2);font-weight:500;white-space:nowrap}
.api-input-wrap{flex:1;min-width:200px;position:relative}
.api-input{
  width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);
  border-radius:8px;padding:8px 36px 8px 12px;color:var(--text);
  font-size:13px;font-family:monospace;transition:all .2s;outline:none
}
.api-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,180,255,.1)}
.api-toggle{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;
  padding:4px;transition:color .2s
}
.api-toggle:hover{color:var(--blue)}
.api-status{
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500
}
.api-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
.api-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
.api-dot.no{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Main ── */
main{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:24px}

/* ── Two Column Layout ── */
.workspace{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
@media(max-width:900px){.workspace{grid-template-columns:1fr}}

/* ── Cards ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden
}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between
}
.card-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:16px}
.card-body{padding:20px}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius2);
  padding:40px 20px;text-align:center;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
  background:rgba(0,0,0,.2)
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--blue);background:rgba(0,180,255,.05);
  box-shadow:var(--glow)
}
.upload-zone.has-image{padding:0;border-style:solid;border-color:rgba(0,180,255,.3)}
.upload-icon{font-size:48px;margin-bottom:12px;display:block}
.upload-title{font-size:16px;font-weight:600;margin-bottom:6px}
.upload-sub{font-size:13px;color:var(--text2)}
.upload-hint{font-size:11px;color:var(--text3);margin-top:8px}
#file-input{display:none}

/* ── Image Preview ── */
.img-wrap{position:relative;width:100%}
.img-wrap img{display:block;width:100%;max-height:480px;object-fit:contain;border-radius:calc(var(--radius2) - 2px)}
.img-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:flex-start;padding:12px}
.img-badge{
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;font-size:11px;color:var(--text2)
}
.canvas-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:calc(var(--radius2) - 2px)}

/* ── Analyze Button ── */
.btn-analyze{
  width:100%;margin-top:16px;padding:14px;
  background:linear-gradient(135deg,var(--blue2),#005fa3);
  border:1px solid rgba(0,180,255,.4);border-radius:var(--radius2);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.3px
}
.btn-analyze::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  opacity:0;transition:opacity .2s
}
.btn-analyze:hover:not(:disabled)::before{opacity:1}
.btn-analyze:hover:not(:disabled){box-shadow:0 4px 20px rgba(0,112,204,.5);transform:translateY(-1px)}
.btn-analyze:active:not(:disabled){transform:translateY(0)}
.btn-analyze:disabled{opacity:.5;cursor:not-allowed}
.btn-analyze.loading{pointer-events:none}

/* ── Scan Animation ── */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);
  animation:scanDown 1.5s ease-in-out infinite;
  box-shadow:0 0 12px var(--blue)
}
@keyframes scanDown{0%{top:-2px}100%{top:calc(100% + 2px)}}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Results ── */
.result-empty{
  text-align:center;padding:48px 20px;color:var(--text3);
  display:flex;flex-direction:column;align-items:center;gap:12px
}
.result-empty .big-icon{font-size:56px;opacity:.4}

/* ── Result Header ── */
.result-status{
  display:flex;align-items:center;gap:12px;padding:16px 20px;
  border-bottom:1px solid var(--border2)
}
.status-badge{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-radius:20px;font-size:13px;font-weight:700
}
.status-badge.detected{background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.4);color:var(--red)}
.status-badge.normal{background:rgba(0,217,126,.15);border:1px solid rgba(0,217,126,.4);color:var(--green)}

/* ── Fracture Type Card ── */
.fracture-type-card{
  margin:16px 20px;padding:16px;
  background:linear-gradient(135deg,rgba(0,112,204,.15),rgba(0,70,140,.1));
  border:1px solid rgba(0,180,255,.2);border-radius:var(--radius2)
}
.fracture-type-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.fracture-type-sub{font-size:13px;color:var(--blue)}

/* ── Metrics Grid ── */
.metrics-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  padding:0 20px 16px
}
.metric-card{
  background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--radius2);padding:14px;text-align:center
}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-val{font-size:20px;font-weight:800}
.metric-val.conf{color:var(--blue)}
.metric-val.sev-none{color:var(--green)}
.metric-val.sev-mild{color:var(--teal)}
.metric-val.sev-moderate{color:var(--yellow)}
.metric-val.sev-severe{color:var(--red)}
.metric-val.qual-excellent,.metric-val.qual-good{color:var(--green)}
.metric-val.qual-fair{color:var(--yellow)}
.metric-val.qual-poor{color:var(--red)}

/* ── Confidence Bar ── */
.conf-bar-wrap{padding:0 20px 16px}
.conf-bar-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.conf-bar-bg{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.conf-bar-fill{height:100%;border-radius:4px;transition:width 1s ease;background:linear-gradient(90deg,var(--blue2),var(--teal))}

/* ── Location ── */
.location-row{
  margin:0 20px 16px;padding:12px 14px;
  background:rgba(0,0,0,.2);border:1px solid var(--border2);
  border-radius:var(--radius2);display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:var(--text2)
}
.location-row .loc-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* ── Observations ── */
.obs-section{padding:0 20px 20px}
.obs-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px}
.obs-list{display:flex;flex-direction:column;gap:6px}
.obs-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:rgba(0,0,0,.2);border-radius:8px;border-left:2px solid var(--blue);
  font-size:13px;color:var(--text2)
}
.obs-item .obs-dot{
  width:6px;height:6px;border-radius:50%;background:var(--blue);
  margin-top:4px;flex-shrink:0
}

/* ── Fracture Info Panel ── */
.info-section{
  margin:0 20px 20px;padding:16px;
  background:rgba(0,0,0,.2);border:1px solid var(--border2);border-radius:var(--radius2)
}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.info-grid{grid-template-columns:1fr}}
.info-item-title{font-size:11px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.info-item-text{font-size:12px;color:var(--text2);line-height:1.6}

/* ── Bottom Bar ── */
.bottom-bar{
  background:rgba(5,11,24,.95);border-top:1px solid var(--border2);
  padding:12px 24px;text-align:center;font-size:12px;color:var(--text3)
}
.bottom-bar a{color:var(--blue);text-decoration:none}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:12px 20px;font-size:13px;color:var(--text);
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;
  transition:transform .3s ease;max-width:420px;width:calc(100% - 48px)
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error .toast-icon{color:var(--red)}
.toast.success .toast-icon{color:var(--green)}
.toast.info .toast-icon{color:var(--blue)}

/* ── Disclaimer ── */
.disclaimer{
  margin:0 20px 16px;padding:10px 14px;
  background:rgba(255,215,10,.05);border:1px solid rgba(255,215,10,.2);
  border-radius:8px;font-size:11px;color:rgba(255,215,10,.7);
  display:flex;align-items:flex-start;gap:8px
}

/* ── Loading Skeleton ── */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:400% 100%;animation:shimmer 1.5s infinite;
  border-radius:6px
}
@keyframes shimmer{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* ── History ── */
.history-section{margin-top:24px}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px 20px}
.history-item{
  background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius2);
  overflow:hidden;cursor:pointer;transition:all .2s
}
.history-item:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--glow)}
.history-thumb{width:100%;height:100px;object-fit:cover}
.history-info{padding:8px 10px}
.history-type{font-size:12px;font-weight:700;color:var(--text)}
.history-time{font-size:10px;color:var(--text3);margin-top:2px}
.history-empty{padding:20px;text-align:center;color:var(--text3);font-size:13px}

/* ── Responsive ── */
@media(max-width:640px){
  header{padding:0 16px}
  main{padding:16px}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🦴</div>
    <div>
      <div class="logo-text">BoneScan AI</div>
      <div class="logo-sub" data-i18n="subtitle">Fracture Intelligence System</div>
    </div>
  </div>
  <div class="header-right">
    <div class="lang-btn">
      <button onclick="setLang('zh')" id="lang-zh" class="active">中文</button>
      <button onclick="setLang('en')" id="lang-en">EN</button>
      <button onclick="setLang('ko')" id="lang-ko">한국어</button>
    </div>
  </div>
</header>

<!-- API Key Bar -->
<div class="api-bar">
  <label data-i18n="api_key">API 密钥</label>
  <div class="api-input-wrap">
    <input type="password" class="api-input" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="api-toggle" onclick="toggleApiVis()" id="api-vis-btn">👁</button>
  </div>
  <div class="api-status">
    <div class="api-dot" id="api-dot"></div>
    <span id="api-status-text" data-i18n="api_no_key">未配置</span>
  </div>
</div>

<!-- Main -->
<main>
  <div class="workspace">

    <!-- Left: Upload -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">🩻</span><span data-i18n="upload_title">上传X光片</span></div>
        <span id="img-size-badge" style="font-size:11px;color:var(--text3)"></span>
      </div>
      <div class="card-body">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <span class="upload-icon">📡</span>
          <div class="upload-title" data-i18n="upload_drop">拖拽或点击上传</div>
          <div class="upload-sub" data-i18n="upload_sub">支持 JPG · PNG · WEBP · BMP · DICOM 预览</div>
          <div class="upload-hint" data-i18n="upload_hint">建议使用标准X光片，分辨率越高分析越准确</div>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">

        <button class="btn-analyze" id="btn-analyze" onclick="startAnalysis()" disabled>
          <span id="btn-icon">🔍</span>
          <span id="btn-text" data-i18n="btn_analyze">开始AI分析</span>
        </button>
      </div>
    </div>

    <!-- Right: Results -->
    <div class="card" id="result-card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📊</span><span data-i18n="result_title">分析结果</span></div>
        <div id="result-quality-badge" style="display:none;font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.2);color:var(--blue)"></div>
      </div>
      <div id="result-body">
        <div class="result-empty" id="result-placeholder">
          <div class="big-icon">🔬</div>
          <div style="font-size:14px;font-weight:500;color:var(--text2)" data-i18n="result_placeholder">上传X光片后点击分析</div>
          <div style="font-size:12px" data-i18n="result_placeholder_sub">AI将自动识别骨折类型、位置和严重程度</div>
        </div>
      </div>
    </div>

  </div>

  <!-- History -->
  <div class="card history-section" id="history-section" style="display:none">
    <div class="card-header">
      <div class="card-title"><span class="icon">🗂</span><span data-i18n="history_title">分析历史</span></div>
      <button onclick="clearHistory()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'" data-i18n="history_clear">清除历史</button>
    </div>
    <div class="history-grid" id="history-grid"></div>
  </div>

</main>

<!-- Bottom -->
<div class="bottom-bar">
  <span data-i18n="disclaimer">⚠ 本系统仅供教育与研究参考，不作为临床诊断依据。请咨询专业医疗人员。</span>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">ℹ</span>
  <span id="toast-msg"></span>
</div>

<script>
// ─────────────────────────────────────────────
// i18n
// ─────────────────────────────────────────────
const LANGS = {

    upload_sub:'支持 JPG · PNG · WEBP · BMP',

    btn_analyze:'开始AI分析',btn_analyzing:'正在分析中…',
    result_title:'分析结果',result_placeholder:'上传X光片后点击分析',
    result_placeholder_sub:'AI将自动识别骨折类型、位置和严重程度',
    history_title:'分析历史',history_clear:'清除历史',
    disclaimer:'⚠ 本系统仅供教育与研究参考，不作为临床诊断依据。请咨询专业医疗人员。',
    detected:'检测到骨折',normal:'未检测到骨折',
    conf:'置信度',severity:'严重程度',quality:'图像质量',
    location_label:'骨折位置',observations_title:'观察发现',
    cause_title:'常见原因',treatment_title:'治疗方案',recovery_title:'恢复时间',
    sev_none:'无',sev_mild:'轻度',sev_moderate:'中度',sev_severe:'重度',
    qual_poor:'差',qual_fair:'一般',qual_good:'良好',qual_excellent:'优秀',
    err_no_key:'请先输入 Anthropic API 密钥',
    err_no_img:'请先上传X光图像',
    err_parse:'分析响应解析失败，请重试',
    err_api:'API 调用失败',
    toast_success:'分析完成！',
    toast_upload:'图像已加载',
  },
  en: {
    subtitle:'Fracture Intelligence System',api_key:'API Key',api_no_key:'Not configured',api_ready:'Ready',
    upload_title:'Upload X-Ray',upload_drop:'Drag & Drop or Click',

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn button').forEach(b => b.classList.remove('active'));
  document.getElementById('lang-' + lang).classList.add('active');
  document.querySelectorAll('[data-i18n]').forEach(el => {

// ─────────────────────────────────────────────
// Drag & Drop
// ─────────────────────────────────────────────
function setupDragDrop() {
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file);
    else showToast(t('err_no_img'), 'error');
  });
}

// ─────────────────────────────────────────────
// File Select
// ─────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) loadImageFile(file);
}
function loadImageFile(file) {
  currentMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    currentImage = dataUrl.split(',')[1];
    showImagePreview(dataUrl, file.name, file.size);
    document.getElementById('btn-analyze').disabled = false;
    showToast(t('toast_upload'), 'success');
  };
  reader.readAsDataURL(file);
}
function showImagePreview(dataUrl, name, size) {
  const zone = document.getElementById('upload-zone');
  zone.classList.add('has-image');
  zone.onclick = null;
  zone.innerHTML = `
    <div class="img-wrap">
      <img src="${dataUrl}" id="preview-img" alt="X-ray preview">
      <canvas class="canvas-overlay" id="result-canvas"></canvas>
      <div class="img-overlay">
        <div class="img-badge">📎 ${name} · ${(size/1024).toFixed(1)}KB</div>
      </div>
    </div>
  `;
  zone.addEventListener('click', () => document.getElementById('file-input').click(), {once:true});
  // Re-attach drag
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file);
  });
}

// ─────────────────────────────────────────────
// Analysis
// ─────────────────────────────────────────────
async function startAnalysis() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showToast(t('err_no_key'), 'error'); return; }
  if (!currentImage) { showToast(t('err_no_img'), 'error'); return; }

  setAnalyzingState(true);
  showLoadingSkeleton();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: currentMime, data: currentImage }
            },
            {
              type: 'text',
              text: `You are a professional medical imaging AI. Carefully analyze this bone X-ray image.
Return ONLY valid JSON, no markdown, no explanation:
{
  "detected": true or false,
  "type": "avulsion|comminuted|dislocation|greenstick|hairline|impacted|longitudinal|oblique|pathological|spiral|unclear",
  "confidence": 0-100,
  "severity": "none|mild|moderate|severe",
  "location": "precise anatomical location in English",
  "location_zh": "精确解剖位置（中文）",
  "observations": ["finding 1", "finding 2", "finding 3"],
  "observations_zh": ["发现1", "发现2", "发现3"],
  "quality": "poor|fair|good|excellent"
}`
            }
          ]
        }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    let raw = data.content[0].text.trim();
    raw = raw.replace(/^```json?\s*/,'').replace(/\s*```$/,'').trim();

    let result;
    try { result = JSON.parse(raw); }
    catch { throw new Error(t('err_parse')); }

    window._lastResult = result;
    renderResult(result);
    saveHistory(result);
    showToast(t('toast_success'), 'success');

  } catch (err) {
    showResultError(err.message);
    showToast(t('err_api') + ': ' + err.message, 'error');
  } finally {
    setAnalyzingState(false);
  }
}

function setAnalyzingState(on) {
  const btn = document.getElementById('btn-analyze');
  const icon = document.getElementById('btn-icon');
  const txt = document.getElementById('btn-text');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  if (on) {
    icon.outerHTML = '<div class="spinner" id="btn-icon"></div>';
    txt.textContent = t('btn_analyzing');
    txt.dataset.i18n = 'btn_analyzing';
    // scan animation
    const zone = document.getElementById('upload-zone');
    if (!zone.querySelector('.scan-line')) {
      const line = document.createElement('div');
      line.className = 'scan-line';
      zone.appendChild(line);
    }
  } else {
    const spinEl = document.getElementById('btn-icon');
    if (spinEl && spinEl.classList.contains('spinner')) {
      spinEl.outerHTML = '<span id="btn-icon">🔍</span>';
    }
    txt.textContent = t('btn_analyze');
    txt.dataset.i18n = 'btn_analyze';
    const line = document.getElementById('upload-zone').querySelector('.scan-line');
    if (line) line.remove();
  }
}

  const iLang = info[lang] || info.en;
  const detected = r.detected;

  // Quality badge
  const qBadge = document.getElementById('result-quality-badge');
  qBadge.style.display = 'block';
  qBadge.textContent = t('qual_' + (r.quality || 'fair')) + ' ' + t('quality');

  // Severity class
  const sevClass = 'sev-' + (r.severity || 'none');
  const sevText = t('sev_' + (r.severity || 'none'));

  // Quality class
  const qualClass = 'qual-' + (r.quality || 'fair');
  const qualText = t('qual_' + (r.quality || 'fair'));

  // Location
  const loc = (lang === 'zh' && r.location_zh) ? r.location_zh : r.location;

  // Observations
  const obs = (lang === 'zh' && r.observations_zh && r.observations_zh.length) ? r.observations_zh : (r.observations || []);

  // Confidence color
  const conf = r.confidence || 0;
  const confColor = conf >= 80 ? 'var(--green)' : conf >= 60 ? 'var(--yellow)' : 'var(--red)';

  document.getElementById('result-body').innerHTML = `
    <div class="result-status">
      <div class="status-badge ${detected ? 'detected' : 'normal'}">
        ${detected ? '🔴' : '🟢'} ${t(detected ? 'detected' : 'normal')}

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">${t('conf')}</div>
        <div class="metric-val conf">${conf}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">${t('severity')}</div>
        <div class="metric-val ${sevClass}">${sevText}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">${t('quality')}</div>
        <div class="metric-val ${qualClass}">${qualText}</div>
      </div>
    </div>

    <div class="conf-bar-wrap">
      <div class="conf-bar-label">
        <span>${t('conf')}</span>
        <span style="color:${confColor};font-weight:700">${conf}%</span>
      </div>
      <div class="conf-bar-bg">
        <div class="conf-bar-fill" style="width:0%;background:linear-gradient(90deg,${conf>=80?'var(--blue2),var(--teal)':conf>=60?'var(--blue2),var(--yellow)':'#c0392b,var(--red)'})" id="conf-bar"></div>
      </div>
    </div>

    <div class="location-row">
      <span class="loc-icon">📍</span>
      <div><strong style="color:var(--text);font-size:12px">${t('location_label')}</strong><br>${loc || '—'}</div>
    </div>

    <div class="obs-section">
      <div class="obs-title">${t('observations_title')}</div>
      <div class="obs-list">
        ${obs.map(o => `<div class="obs-item"><span class="obs-dot"></span>${o}</div>`).join('')}
      </div>
    </div>

    <div class="disclaimer">
      <span>⚠</span><span>${t('disclaimer').replace('⚠ ','')}</span>
    </div>

    <div class="info-section">
      <div class="info-grid">
        <div>
          <div class="info-item-title">${t('cause_title')}</div>
          <div class="info-item-text">${iLang.cause}</div>
        </div>
        <div>
          <div class="info-item-title">${t('treatment_title')}</div>
          <div class="info-item-text">${iLang.treatment}</div>
        </div>
        <div>
          <div class="info-item-title">${t('recovery_title')}</div>
          <div class="info-item-text">${iLang.recovery}</div>
        </div>
      </div>
    </div>
  `;

  // Animate confidence bar
  setTimeout(() => {
    const bar = document.getElementById('conf-bar');
    if (bar) bar.style.width = conf + '%';
  }, 100);
}

function showResultError(msg) {
  document.getElementById('result-body').innerHTML = `
    <div class="result-empty">
      <div class="big-icon">⚠️</div>
      <div style="font-size:14px;font-weight:600;color:var(--red)">Analysis Failed</div>
      <div style="font-size:12px;color:var(--text2);max-width:280px;text-align:center;line-height:1.6">${msg}</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// History
// ─────────────────────────────────────────────
function saveHistory(result) {
  if (!currentImage) return;
  const entry = {
    id: Date.now(),
    time: new Date().toLocaleString(),
    type: result.type,
    confidence: result.confidence,
    detected: result.detected,
    thumb: 'data:' + currentMime + ';base64,' + currentImage,
    result
  };
  history.unshift(entry);
  if (history.length > 8) history = history.slice(0, 8);
  localStorage.setItem('bsai-history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const grid = document.getElementById('history-grid');
  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  const info = (t) => (FRACTURE_INFO[t] || FRACTURE_INFO.unclear)[currentLang] || (FRACTURE_INFO[t] || FRACTURE_INFO.unclear).en;
  grid.innerHTML = history.map(h => `
    <div class="history-item" onclick="loadHistoryItem(${h.id})">
      <img class="history-thumb" src="${h.thumb}" alt="">
      <div class="history-info">
        <div class="history-type">${info(h.type).name}</div>
        <div class="history-time">${h.confidence}% · ${h.time}</div>
      </div>
    </div>
  `).join('');
}

function loadHistoryItem(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  currentImage = h.thumb.split(',')[1];
  currentMime = h.thumb.split(':')[1].split(';')[0];
  showImagePreview(h.thumb, 'history', 0);
  document.getElementById('btn-analyze').disabled = false;
  window._lastResult = h.result;
  renderResult(h.result);
}

function clearHistory() {
  history = [];
  localStorage.removeItem('bsai-history');
  renderHistory();
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toast-icon');
  const msgEl = document.getElementById('toast-msg');
  const icons = { info: 'ℹ', success: '✓', error: '✕' };
  toast.className = 'toast ' + type;
  icon.textContent = icons[type] || 'ℹ';
  msgEl.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
}
</script>
</body>
</html>
